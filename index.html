<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我们的浪漫时光</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="myAudio" src="music.mp3" loop controls></audio>
    <div class="card">
        <div class="photo-frame">
            <img src="love.jpg" alt="我们的合照" id="love-img">
        </div>

        <h1>❤️ 我们的恋爱计时</h1>

        <div id="timer">
            <span id="d">0</span>天 
            <span id="h">0</span>时 
            <span id="m">0</span>分 
            <span id="s">0</span>秒
        </div>

        <button onclick="sendLove()">发送一份思念</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
