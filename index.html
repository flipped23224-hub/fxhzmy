<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的浪漫时光</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class="album-container">
            <div class="swiper" id="photo-list">
                </div>
            <div class="album-nav">
                <span onclick="prevSlide()">❮</span>
                <span onclick="nextSlide()">❯</span>
            </div>
        </div>

        <h1>❤️ 我们的恋爱计时</h1>

        <div id="timer">
            <span id="d">0</span>天 
            <span id="h">0</span>时 
            <span id="m">0</span>分 
            <span id="s">0</span>秒
        </div>

        <button onclick="sendLove()">发送一份思念</button>
    </div>

    <audio id="myAudio" src="music.mp3" loop></audio>

    <script src="script.js"></script>
</body>
</html>
